name: Excavator

# Polls cadence-hooks GitHub releases and auto-updates bucket/cadence-hooks.json
# (version + hash) via the manifest's checkver/autoupdate fields. Self-contained:
# pushes to this same repo with GITHUB_TOKEN, so no cross-repo secrets are needed.

on:
  schedule:
    - cron: "20 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  excavate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Excavate
        uses: ScoopInstaller/GithubActions@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_UPDATED: 1
